# Copy this file to: .github/workflows/ci.yml (via GitHub website: Add file → Create new file)
# Reason: HTTPS + PAT without "Workflows" permission cannot push workflow files from Git CLI.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test
